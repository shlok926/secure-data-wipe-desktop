name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ master, develop ]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check Python imports
      run: |
        python -c "import PyQt6; print('✅ PyQt6 imported successfully')"
        python -c "with open('wiper_core.py') as f: compile(f.read(), 'wiper_core.py', 'exec'); print('✅ wiper_core.py syntax OK')"
        python -c "with open('secure_wipe_desktop.py') as f: compile(f.read(), 'secure_wipe_desktop.py', 'exec'); print('✅ secure_wipe_desktop.py syntax OK')"
      continue-on-error: true

  build:
    needs: test
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build executable (optional)
      run: python build_exe.py
      continue-on-error: true
      
    - name: Check build result
      run: |
        if Test-Path "dist/SecureWipe.exe" {
          Write-Host "✅ Build successful - exe created"
        } else {
          Write-Host "⚠️ Build skipped - use 'python build_exe.py' locally"
        }
      shell: powershell
      continue-on-error: true
