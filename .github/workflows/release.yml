name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build executable
      run: python build_exe.py
    
    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $env:GITHUB_OUTPUT
      shell: powershell
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: SecureWipe ${{ steps.version.outputs.VERSION }}
        body: |
          🎉 New Release: SecureWipe Desktop ${{ steps.version.outputs.VERSION }}
          
          ## Features
          - [x] Military-grade secure wiping
          - [x] Multi-algorithm support
          - [x] Comprehensive audit logging
          - [x] Professional UI
          
          ## Downloads
          - **SecureWipe.exe** - Standalone executable (Windows 10/11)
          
          ## Installation
          1. Download `SecureWipe.exe`
          2. Right-click → Run as Administrator
          3. Grant permissions when prompted
          
          ## Changes
          See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          
          ## Support
          - 📖 [Documentation](README.md)
          - 🐛 [Report Issues](https://github.com/shlok926/secure-data-wipe-desktop/issues)
          - 💬 [Discussions](https://github.com/shlok926/secure-data-wipe-desktop/discussions)
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/SecureWipe.exe
        asset_name: SecureWipe-${{ steps.version.outputs.VERSION }}.exe
        asset_content_type: application/octet-stream
